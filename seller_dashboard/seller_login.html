<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller login</title>
    <link rel="stylesheet" href="../assets/css/seller_login.css">
    <link rel="stylesheet" href="../assets/vendor/bootstrap/css/bootstrap.css">
    <!-- Bootstrap icon link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <section class="sec-login py-0">
        <div class="container px-0">
            <div class="login-wrapper">
                <div class="row g-0">
                    <div class="col-12 col-lg-6">
                        <div class="card border-0">
                            <div class="card-img text-center">
                                <img src="../assets/img/seller_images/logo.jpg" class="logo-img" alt="">
                                <img src="../assets/img/seller_images/Becoming_an_online_seller.jpg" class="banner-img" alt="">
                            </div>
                            <div class="card-body">
                                <h1 class="title">
                                    ចង់បង្កើតអាជីវកម្មផ្ទាល់ខ្លួនមែនទេ?
                                </h1>
                                <p class="sub-title">
                                    ចូលរួមជាមួយអ្នកលក់រាប់ពាន់នាក់ និងចាប់ផ្តើមលក់ផលិតផលរបស់អ្នកថ្ងៃនេះ
                                </p>
                                <div class="seller-info">
                                    <div class="detail"><i class="bi bi-check"></i>អ្នកលក់ជាង 10,000 នាក់</div>
                                    <div class="detail"><i class="bi bi-check"></i>ការទូទាត់មានសុវត្ថិភាព</div>
                                    <div class="detail"><i class="bi bi-check"></i>គ្រប់គ្រងហាងបានងាយស្រួល</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card border-0">
                            <div class="form-side">

                                <div class="form-wrapper">

                                    <h2 class="text-center fw-bold">
                                        ចូលគណនី
                                    </h2>

                                    <p class="welcome text-center">
                                        ស្វាគមន៍មកកាន់គណនីរបស់អ្នកលក់
                                    </p>

                                    <form action="seller_dashboard.html" method="GET">

                                        <div class="mb-4">

                                            <label class="form-label">
                                                អ៊ីមែល ឬលេខទូរសព្ទ
                                            </label>

                                            <input type="email" class="form-control"
                                                placeholder="បញ្ចូលអ៊ីមែល ឬលេខទូរសព្ទ" required>

                                        </div>

                                        <div class="mb-4">

                                            <label class="form-label">
                                                ពាក្យសម្ងាត់
                                            </label>

                                            <input type="password" class="form-control" placeholder="បញ្ចូលពាក្យសម្ងាត់"
                                                required>

                                        </div>

                                        <div class="d-flex justify-content-between align-items-center mb-4">

                                            <div>

                                                <input type="checkbox" class="form-check-input" id="remember">

                                                <label class="ms-1" for="remember">
                                                    ចងចាំខ្ញុំ
                                                </label>

                                            </div>

                                            <a href="seller_forgot_password.html" class="link">
                                                ភ្លេចពាក្យសម្ងាត់?
                                            </a>

                                        </div>

                                        <button type="submit" class="btn btn-login w-100">

                                            ចូលប្រើ

                                        </button>

                                        <div class="register-section">

                                            <span>
                                                មិនទាន់មានគណនី?
                                            </span>

                                            <a href="seller_register.html">
                                                ចុះឈ្មោះប្រើ
                                            </a>

                                        </div>
                                        <div class="social-login">

                                            <button type="button" class="social-btn google-btn">
                                                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
                                                    alt="">
                                                បន្តជាមួយ Google
                                            </button>

                                            <button type="button" class="social-btn facebook-btn">
                                                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg"
                                                    alt="">
                                                បន្តជាមួយ Facebook
                                            </button>

                                        </div>

                                    </form>

                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
