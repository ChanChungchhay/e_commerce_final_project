<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller reset password</title>
    <link rel="stylesheet" href="assets/css/seller_reset_password.css">
    <link rel="stylesheet" href="assets/vendor/bootstrap/css/bootstrap.css">
    <!-- Link Icon bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <section class="sec-forgot_pw py-0">
        <div class="container px-0">
            <div class="login-wrapper">
                <div class="row g-0">
                    <div class="col-12 col-lg-6">
                        <div class="card border-0">
                            <div class="card-img text-center">
                                <img src="assets/img/seller_images/forgot_pw.png" class="banner-img" alt="">
                            </div>
                            <div class="card-body">

                                <h1 class="title">
                                    កំណត់ពាក្យសម្ងាត់ថ្មី
                                </h1>

                                <p class="sub-title">
                                    សុវត្ថិភាពគណនីអ្នកលក់គឺសំខាន់។
                                    សូមប្រើពាក្យសម្ងាត់ដែលមានភាពរឹងមាំ។
                                </p>

                                <div class="seller-info">

                                    <div class="detail"><i class="bi bi-check"></i>យ៉ាងតិច 8 តួអក្សរ</div>
                                    <div class="detail"><i class="bi bi-check"></i>មានអក្សរធំ អក្សរតូច និងលេខ</div>
                                    <div class="detail"><i class="bi bi-check"></i>ការពារគណនីអ្នកលក់បានកាន់តែប្រសើរ</div>

                                </div>

                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card border-0">
                            <div class="form-side">

                                <div class="form-wrapper">

                                    <h2 class="text-center fw-bold">
                                        កំណត់ពាក្យសម្ងាត់ថ្មី
                                    </h2>

                                    <p class="welcome text-center">
                                        សូមបង្កើតពាក្យសម្ងាត់ថ្មីសម្រាប់គណនីអ្នកលក់
                                    </p>

                                    <form action="seller_login.html" method="get" >

                                        <div class="mb-4">
                                            <label class="form-label">ពាក្យសម្ងាត់ថ្មី</label>

                                            <div class="password-wrapper">
                                                <input type="password" id="newPassword"
                                                    class="form-control password-input"
                                                    placeholder="បញ្ចូលពាក្យសម្ងាត់ថ្មី">

                                                <button type="button" class="toggle-password" data-target="newPassword">
                                                    <i class="bi bi-eye"></i>
                                                </button>
                                            </div>
                                        </div>

                                        <div class="mb-4">
                                            <label class="form-label">បញ្ជាក់ពាក្យសម្ងាត់</label>

                                            <div class="password-wrapper">
                                                <input type="password" id="confirmPassword"
                                                    class="form-control password-input" placeholder="បញ្ចូលម្ដងទៀត">

                                                <button type="button" class="toggle-password"
                                                    data-target="confirmPassword">
                                                    <i class="bi bi-eye"></i>
                                                </button>
                                            </div>
                                        </div>

                                        <button type="submit" id="submitBtn" class="btn btn-login w-100">
                                            ប្ដូរពាក្យសម្ងាត់
                                        </button>
                                        <div class="register-section">

                                            <a href="seller_login.html">
                                                <i class="bi bi-arrow-left"></i> ត្រឡប់ទៅទំព័រចូលគណនី
                                            </a>

                                        </div>

                                    </form>

                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/seller_reset_password.js"></script>
</body>

</html>
